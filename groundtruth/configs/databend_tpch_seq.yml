run:
  run_id: demo-databend-seq
  output_root: groundtruth/output

engine:
  type: databend
  host: 10.0.21.19
  port: 8000
  default_database: default
  prometheus_host: 10.0.21.19
  prometheus_port: 9091
  prometheus_scrape_wait_s: 2.0

workload:
  benchmark: tpch
  query_pool_path: src/Collect_metrics/metrics_witho/input/TPCH-tpch1g-sql-input-standard.json

execution:
  mode: sequential
  concurrency: 1
  timeout_s: 300
  seed: 42
  selection_mode: as_is
  max_queries: 5
